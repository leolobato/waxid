name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject Last.fm keys
        run: |
          echo '{"api_key":"${{ secrets.LASTFM_API_KEY }}","secret":"${{ secrets.LASTFM_SECRET }}"}' \
            > server/app/lastfm_keys.json

      - uses: docker/build-push-action@v6
        with:
          context: server
          push: true
          build-args: GIT_COMMIT=${{ github.sha }}
          tags: |
            ghcr.io/leolobato/waxid:latest
            ghcr.io/leolobato/waxid:${{ github.ref_name }}

  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > /tmp/waxid.jks

      - name: Build release APK
        working-directory: client/android
        run: ./gradlew assembleRelease
        env:
          RELEASE_STORE_FILE: /tmp/waxid.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Rename APK
        run: cp client/android/app/build/outputs/apk/release/app-release.apk waxid-${{ github.ref_name }}.apk

      - uses: softprops/action-gh-release@v2
        with:
          files: waxid-${{ github.ref_name }}.apk
          generate_release_notes: true
