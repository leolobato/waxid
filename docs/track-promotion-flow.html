<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WaxID — Track Promotion Flow</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0;
    background: #121212;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    line-height: 1.55;
  }
  main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
  h1, h2 { color: #fff; }
  h1 { font-size: 1.6rem; }
  h2 { font-size: 1.2rem; margin-top: 2.5rem; }
  a { color: #7ab8f5; }
  code {
    background: #1f1f1f;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 0.1em 0.35em;
    font-size: 0.9em;
  }
  table { border-collapse: collapse; margin: 1rem 0; }
  th, td { border: 1px solid #333; padding: 0.4rem 0.8rem; text-align: left; }
  th { background: #1f1f1f; }
  .mermaid {
    background: #181818;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 1rem;
    margin: 1.5rem 0;
    overflow-x: auto;
  }
  .error { color: #f08080; white-space: pre-wrap; }
  nav {
    position: sticky;
    top: 0;
    background: #121212ee;
    border-bottom: 1px solid #2a2a2a;
    padding: 0.6rem 1.5rem;
    display: flex;
    gap: 1.5rem;
    backdrop-filter: blur(4px);
  }
  nav a { text-decoration: none; font-weight: 600; }
  section + section { border-top: 2px solid #2a2a2a; margin-top: 3rem; padding-top: 1rem; }
</style>
</head>
<body>
<nav>
  <a href="#current">Current flow (reference)</a>
  <a href="#v1">v1 (approved plan)</a>
  <a href="#v2">v2 (simplified)</a>
</nav>
<main id="content"><p>Loading…</p></main>

<script type="module">
import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
import { marked } from "https://cdn.jsdelivr.net/npm/marked@12/lib/marked.esm.js";

mermaid.initialize({ startOnLoad: false, theme: "dark", securityLevel: "loose" });

const DOCS = [
  { file: "track-promotion-flow.md", anchor: "current" },
  { file: "track-promotion-flow-v1.md", anchor: "v1" },
  { file: "track-promotion-flow-v2.md", anchor: "v2" },
];

const content = document.getElementById("content");

// Render markdown, turning ```mermaid fences into <pre class="mermaid">.
const renderer = new marked.Renderer();
const defaultCode = renderer.code.bind(renderer);
renderer.code = (code, lang, escaped) => {
  const src = typeof code === "object" ? code.text : code;
  const language = typeof code === "object" ? code.lang : lang;
  if (language === "mermaid") return `<pre class="mermaid">${src}</pre>`;
  return defaultCode(code, lang, escaped);
};

try {
  const sections = await Promise.all(DOCS.map(async ({ file, anchor }) => {
    const res = await fetch(file);
    if (!res.ok) throw new Error(`HTTP ${res.status} fetching ${file}`);
    const md = await res.text();
    return `<section id="${anchor}">${marked.parse(md, { renderer })}</section>`;
  }));
  content.innerHTML = sections.join("");

  await mermaid.run({ nodes: content.querySelectorAll(".mermaid") });
} catch (err) {
  content.innerHTML = `<p class="error">Failed to render: ${err.message}\n\nIf you opened this via file://, serve the docs folder instead:\n  cd docs && python3 -m http.server 8459\nthen open http://localhost:8459/track-promotion-flow.html</p>`;
}
</script>
</body>
</html>
